<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大五维人格测评 · Big Five (OCEAN)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f8f4ed;
    --card: #fefcf7;
    --text: #2c2416;
    --muted: #8b8172;
    --accent: #b5342e;
    --accent2: #3a5a5a;
    --danger: #b5342e;
    --o-color: #5a4a3a;
    --c-color: #3a5a5a;
    --e-color: #6b4e3d;
    --a-color: #4a6b5a;
    --n-color: #7a4a4a;
    --radius: 4px;
    --shadow: 0 2px 16px rgba(44,36,22,.08);
    --ink-border: #d4cdbc;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px;
    background-image: 
      radial-gradient(ellipse at 50% 0%, rgba(181,52,46,.04), transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(58,90,90,.03), transparent 50%);
  }
  .container {
    width: 100%;
    max-width: 720px;
  }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 48px 40px;
    box-shadow: var(--shadow);
    border: 1px solid var(--ink-border);
  }
  h1 {
    font-family: 'Ma Shan Zheng', 'STKaiti', 'KaiTi', 'Kaiti SC', cursive;
    font-size: 2.4rem;
    text-align: center;
    color: var(--text);
    margin-bottom: 8px;
    font-weight: 400;
    letter-spacing: .05em;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: .9rem;
    margin-bottom: 36px;
    letter-spacing: .08em;
  }
  .intro-text {
    color: var(--muted);
    line-height: 1.8;
    margin-bottom: 28px;
    font-size: .95rem;
  }
  .trait-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .trait-chip {
    background: var(--card);
    border: 1px solid var(--ink-border);
    border-radius: 2px;
    padding: 16px 12px;
    text-align: center;
    font-size: .82rem;
    position: relative;
  }
  .trait-chip::after {
    content: '';
    position: absolute;
    right: 8px; top: 8px;
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    opacity: .4;
  }
  .trait-chip .emoji { font-size: 1.4rem; display:block; margin-bottom: 6px; }
  .trait-chip .label { font-weight: 600; display:block; margin-bottom:2px; }
  .trait-chip .en   { font-size: .72rem; color: var(--muted); }
  .btn {
    display: inline-block;
    padding: 12px 36px;
    border: 1px solid var(--text);
    border-radius: 2px;
    font-size: .95rem;
    font-weight: 400;
    cursor: pointer;
    transition: all .25s;
    text-decoration: none;
    background: transparent;
    color: var(--text);
    font-family: inherit;
    letter-spacing: .04em;
  }
  .btn-primary {
    background: var(--text);
    color: var(--card);
    border-color: var(--text);
  }
  .btn-primary:hover {
    background: var(--accent);
    border-color: var(--accent);
  }
  .btn-secondary {
    border-color: var(--ink-border);
    color: var(--muted);
  }
  .btn-secondary:hover {
    border-color: var(--text);
    color: var(--text);
  }
  .btn-sm {
    padding: 10px 24px;
    font-size: .85rem;
  }
  .btn-center { text-align: center; margin-top: 12px; }
  .progress-wrap {
    margin-bottom: 24px;
  }
  .progress-bar-bg {
    height: 2px;
    background: var(--ink-border);
    border-radius: 0;
    overflow: hidden;
  }
  .progress-bar-fg {
    height: 100%;
    background: var(--text);
    border-radius: 0;
    transition: width .4s ease;
  }
  .progress-text {
    text-align: right;
    font-size: .78rem;
    color: var(--muted);
    margin-top: 8px;
  }
  .dimension-label {
    font-size: .82rem;
    color: var(--muted);
    margin-bottom: 16px;
    padding: 4px 0;
    display: inline-block;
    letter-spacing: .06em;
  }
  .question-text {
    font-size: 1.2rem;
    line-height: 1.8;
    margin-bottom: 32px;
    min-height: 52px;
    color: var(--text);
  }
  .likert {
    display: flex;
    justify-content: space-between;
    gap: 6px;
    margin-bottom: 28px;
  }
  .likert-btn {
    flex: 1;
    padding: 14px 4px;
    border-radius: 2px;
    border: 1px solid var(--ink-border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: .82rem;
    transition: all .2s;
    text-align: center;
    font-family: inherit;
  }
  .likert-btn:hover {
    border-color: var(--text);
    color: var(--text);
  }
  .likert-btn.selected {
    background: var(--text);
    border-color: var(--text);
    color: var(--card);
    font-weight: 600;
  }
  .nav-btns {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-top: 4px;
  }
  /* Results */
  .results-header {
    text-align: center;
    margin-bottom: 32px;
  }
  .results-header h2 {
    font-family: 'Ma Shan Zheng', 'STKaiti', 'KaiTi', 'Kaiti SC', cursive;
    font-size: 1.8rem;
    margin-bottom: 6px;
    font-weight: 400;
  }
  .chart-box {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    border: 1px solid var(--ink-border);
    max-width: 420px;
    margin: 0 auto 32px;
  }
  .chart-box canvas { max-height: 320px; }
  .trait-detail {
    margin-bottom: 20px;
    padding: 20px 24px;
    border-radius: 0;
    background: var(--card);
    border: 1px solid var(--ink-border);
    border-left: 3px solid;
  }
  .trait-detail h3 {
    font-size: 1.05rem;
    margin-bottom: 4px;
    font-weight: 600;
  }
  .trait-detail .score-label {
    font-size: .82rem;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .trait-detail .desc {
    font-size: .88rem;
    line-height: 1.8;
    color: var(--muted);
  }
  .score-bar-wrap {
    height: 3px;
    background: var(--ink-border);
    border-radius: 0;
    margin: 12px 0;
    overflow: hidden;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 0;
    transition: width .8s ease;
  }
  .footer-actions {
    text-align: center;
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .hidden { display: none !important; }
  .fade-in { animation: fadeIn .5s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

  /* ===== 水墨渲染层 ===== */
  /* 宣纸纹理 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
    opacity: .6;
  }
  .container { position: relative; z-index: 1; }

  /* 淡墨笔触装饰 — 欢迎页 */
  .card {
    position: relative;
  }
  #screen-welcome::before {
    content: '';
    position: absolute;
    top: -1px; left: 20px; right: 20px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(44,36,22,.15), transparent);
  }
  #screen-welcome::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 20px; right: 20px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(44,36,22,.1), transparent);
  }

  /* 印章点缀 — trait chip */
  .trait-chip::after {
    content: '';
    position: absolute;
    right: 10px; top: 10px;
    width: 16px; height: 16px;
    border: 1.5px solid var(--accent);
    opacity: .35;
    transform: rotate(15deg);
  }

  /* 墨韵 hover */
  .likert-btn:hover { background: rgba(44,36,22,.04); }
  .likert-btn:active { background: rgba(44,36,22,.08); }

  /* 结果页印章装饰 */
  .results-header h2 {
    position: relative;
  }
  .results-header h2::after {
    content: '';
    display: block;
    width: 40px; height: 2px;
    background: var(--accent);
    margin: 12px auto 0;
    opacity: .5;
  }

  /* 中等评语分隔 */
  .trait-detail { transition: border-left-color .3s; }

  /* 响应式微调 */
  @media (max-width: 560px) {
    .card { padding: 32px 20px; }
    h1 { font-size: 1.8rem; }
    .likert { flex-wrap: wrap; }
    .likert-btn { min-width: 100%; }
    .chart-box { max-width: 100%; }
  }
</style>
</head>
<body>
<div class="container" id="app">
  <!-- ========== WELCOME SCREEN ========== -->
  <div class="card fade-in" id="screen-welcome">
    <h1>大五维人格测评</h1>
    <p class="subtitle">Big Five · OCEAN Model</p>
    <div class="intro-text">
      大五人格模型是当代心理学界最具共识的人格理论框架，将人格归纳为五个核心维度。本测试包含 <strong>50 道题目</strong>，预计耗时 <strong>5-8 分钟</strong>。请根据您的真实感受作答，无对错之分。
    </div>
    <div class="trait-grid">
      <div class="trait-chip"><span class="emoji">✦</span><span class="label">开放性</span><span class="en">Openness</span></div>
      <div class="trait-chip"><span class="emoji">◆</span><span class="label">尽责性</span><span class="en">Conscientiousness</span></div>
      <div class="trait-chip"><span class="emoji">◈</span><span class="label">外向性</span><span class="en">Extraversion</span></div>
      <div class="trait-chip"><span class="emoji">❖</span><span class="label">宜人性</span><span class="en">Agreeableness</span></div>
      <div class="trait-chip"><span class="emoji">◉</span><span class="label">神经质</span><span class="en">Neuroticism</span></div>
    </div>
    <div class="btn-center">
      <button class="btn btn-primary" onclick="startTest()">开始测评</button>
    </div>
  </div>

  <!-- ========== TEST SCREEN ========== -->
  <div class="card hidden" id="screen-test">
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fg" id="progress-bar" style="width:0%"></div></div>
      <div class="progress-text" id="progress-text">1 / 50</div>
    </div>
    <div class="dimension-label" id="dim-tag">开放性</div>
    <div class="question-text fade-in" id="question-text"></div>
    <div class="likert" id="likert-group"></div>
    <div class="nav-btns">
      <button class="btn btn-secondary btn-sm" id="btn-prev" onclick="prevQuestion()">← 上一题</button>
      <span id="nav-spacer"></span>
      <button class="btn btn-primary btn-sm" id="btn-next" onclick="nextQuestion()" disabled>下一题</button>
    </div>
  </div>

  <!-- ========== RESULTS SCREEN ========== -->
  <div class="card hidden" id="screen-results">
    <div class="results-header">
      <h2>测评结果</h2>
      <p class="subtitle">大五人格剖面图</p>
    </div>
    <div class="chart-box"><canvas id="radarChart"></canvas></div>
    <div id="trait-details"></div>
    <div class="footer-actions">
      <button class="btn btn-primary btn-sm" onclick="restartTest()">重新测评</button>
      <button class="btn btn-secondary btn-sm" onclick="shareResult()">复制结果</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  QUESTION BANK — 50 items, 10 per dimension
//  Some items are reverse-scored (marked with r: true)
// ============================================================
const questions = [
  // ---- O: 开放性 (Openness) ----
  { d:"O", t:"我对艺术、音乐或文学有浓厚的兴趣。", r:false },
  { d:"O", t:"我喜欢尝试新事物和体验不同的文化。", r:false },
  { d:"O", t:"我有丰富的想象力和创造力。", r:false },
  { d:"O", t:"我经常思考抽象的概念和哲学问题。", r:false },
  { d:"O", t:"我乐于接受不同的观点和生活方式。", r:false },
  { d:"O", t:"我对自然科学或新技术充满好奇。", r:false },
  { d:"O", t:"我更喜欢按部就班，不喜欢变化。", r:true },
  { d:"O", t:"我有广泛的兴趣爱好。", r:false },
  { d:"O", t:"我经常沉浸在思考和内省中。", r:false },
  { d:"O", t:"跟抽象理论相比，我更关注眼前的具体事实。", r:true },

  // ---- C: 尽责性 (Conscientiousness) ----
  { d:"C", t:"我做事有条理，喜欢提前规划。", r:false },
  { d:"C", t:"我能够自律地完成任务，不拖延。", r:false },
  { d:"C", t:"我注重细节，追求高质量的工作。", r:false },
  { d:"C", t:"我遵守承诺，值得他人信赖。", r:false },
  { d:"C", t:"我的房间或工作空间通常整洁有序。", r:false },
  { d:"C", t:"我经常把事情拖到最后一刻才做。", r:true },
  { d:"C", t:"我设定了明确的目标并努力去实现它们。", r:false },
  { d:"C", t:"我做事冲动，想到什么就做什么。", r:true },
  { d:"C", t:"我会认真检查自己的作业或工作成果。", r:false },
  { d:"C", t:"我在团队中通常是推动事情进展的那个人。", r:false },

  // ---- E: 外向性 (Extraversion) ----
  { d:"E", t:"我喜欢参加聚会和社交活动。", r:false },
  { d:"E", t:"我在人群中感到精力充沛。", r:false },
  { d:"E", t:"我很容易结交新朋友。", r:false },
  { d:"E", t:"我说话声音较大，喜欢表达自己。", r:false },
  { d:"E", t:"我宁愿一个人待着，也不愿参加热闹的活动。", r:true },
  { d:"E", t:"我在社交场合中通常是活跃气氛的人。", r:false },
  { d:"E", t:"我不喜欢成为众人关注的焦点。", r:true },
  { d:"E", t:"我喜欢快节奏、充满刺激的生活。", r:false },
  { d:"E", t:"跟很多人在一起时，我倾向于保持安静。", r:true },
  { d:"E", t:"我喜欢与人交谈，分享自己的想法。", r:false },

  // ---- A: 宜人性 (Agreeableness) ----
  { d:"A", t:"我乐于帮助身边有需要的人。", r:false },
  { d:"A", t:"我相信大多数人都是善良诚实的。", r:false },
  { d:"A", t:"我尽量避免与他人发生冲突。", r:false },
  { d:"A", t:"我对他人的感受很敏感，容易共情。", r:false },
  { d:"A", t:"我愿意为了团队利益牺牲个人利益。", r:false },
  { d:"A", t:"我会直言不讳地表达批评意见。", r:true },
  { d:"A", t:"我能够原谅曾经伤害过我的人。", r:false },
  { d:"A", t:"我认为在竞争中压倒对手很重要。", r:true },
  { d:"A", t:"我经常主动赞美和鼓励他人。", r:false },
  { d:"A", t:"我对陌生人通常持谨慎怀疑的态度。", r:true },

  // ---- N: 神经质 (Neuroticism) ----
  { d:"N", t:"我经常感到焦虑或紧张。", r:false },
  { d:"N", t:"我很容易因为小事而情绪波动。", r:false },
  { d:"N", t:"我经常担心未来可能发生的事情。", r:false },
  { d:"N", t:"在压力下我依然能够保持冷静。", r:true },
  { d:"N", t:"我有时会突然感到悲伤或沮丧。", r:false },
  { d:"N", t:"我对自己有充足的信心。", r:true },
  { d:"N", t:"我容易被别人的批评所伤害。", r:false },
  { d:"N", t:"大多数时候我感到满足和平静。", r:true },
  { d:"N", t:"我经常反复思考自己的错误和不足。", r:false },
  { d:"N", t:"遇到突发状况时，我能从容应对。", r:true },
];

const DIM_NAMES = {
  O: { cn:"开放性", en:"Openness", emoji:"✦", color:"#5a4a3a", low:"保守传统", high:"开放创新" },
  C: { cn:"尽责性", en:"Conscientiousness", emoji:"◆", color:"#3a5a5a", low:"随性灵活", high:"自律严谨" },
  E: { cn:"外向性", en:"Extraversion", emoji:"◈", color:"#6b4e3d", low:"内向沉静", high:"外向活跃" },
  A: { cn:"宜人性", en:"Agreeableness", emoji:"❖", color:"#4a6b5a", low:"理性独立", high:"温暖合作" },
  N: { cn:"神经质", en:"Neuroticism", emoji:"◉", color:"#7a4a4a", low:"情绪稳定", high:"敏感波动" },
};

const DESC = {
  O: {
    high: "您在开放性维度上得分较高，体现出强烈的认知需求（Need for Cognition）与审美敏感性。您倾向于主动寻求新异体验，对抽象观念与复杂问题保持开放态度。Costa & McCrae 的研究表明，高开放性个体在创造力测验中表现更优，且更少持有刻板印象。您可能享受智力探索、艺术鉴赏与文化沉浸。",
    low: "您在开放性维度上得分较低，偏好熟悉、可预测的环境与务实的思维方式。这并非认知局限——研究表明，低开放性者往往在执行功能与规则遵循任务上更具优势。您重视传统、秩序与具体经验，在需要稳定输出和精准执行的领域中表现突出。"
  },
  C: {
    high: "您在尽责性维度上得分较高，体现出较强的自我调节能力（Self-Regulation）与成就导向。Barrick & Mount 的元分析表明，尽责性是预测工作绩效最稳定的人格维度。您善于规划、延迟满足，能够为了长期目标而克制短期冲动。您的可靠性与条理性使您在团队中常常承担关键角色。",
    low: "您的尽责性得分较低，反映了更灵活、即兴的行为风格。这并不等同于懒惰——低尽责性者在需要快速适应变化的环境中往往表现更佳，其行为激活系统（BAS）更为敏感。您可能在创造性解决问题和应对突发情境时展现出独特的优势。"
  },
  E: {
    high: "您在外向性维度上得分较高，体现出较强的奖赏敏感性（Reward Sensitivity）。Eysenck 的皮质唤醒理论认为，外向者的基线皮层唤醒水平较低，因而更主动寻求社交刺激以达到最佳唤醒。您从人际互动中获得能量，善于建立广泛的社交网络，在需要表达与影响力的场合中如鱼得水。",
    low: "您在外向性维度上得分较低，偏向内倾。这不等同于社交能力的缺失——Jung 将内倾定义为能量向内流动，内向者在深度思考、精细加工和独处创造上具有天然优势。您偏好有深度的少人数交流，在需要持续专注和独立判断的任务中往往表现出色。"
  },
  A: {
    high: "您在宜人性维度上得分较高，体现出高度的共情能力（Empathy）与合作倾向。Graziano 等人的研究指出，高宜人性者更倾向于采用建设性的冲突解决策略，其观点采择能力更强。您重视人际和谐，善于体察他人情绪，在需要协作与关怀的领域中能够发挥独特价值。",
    low: "您的宜人性得分较低，体现出更强的独立判断力与竞争意识。低宜人性并非攻击性——研究表明，适度保留质疑态度的人在谈判、决策和科学辩论中往往更具优势。您敢于表达异见，不易被群体压力左右，在需要批判性思维和坚定立场的场合中表现突出。"
  },
  N: {
    high: "您在神经质维度上得分较高，情绪体验深刻且反应敏锐。这反映出边缘系统的高度活跃——高神经质者对威胁信号和负面刺激的探测阈值更低。然而，这种敏感也带来更强的内省能力和审美深度。研究表明，适度情绪敏感性在创造性工作中具有适应性价值。",
    low: "您在神经质维度上得分较低，情绪稳定性出色。这体现出较强的心理韧性（Psychological Resilience）与情绪调节能力。低神经质者面对压力时能够维持前额叶的执行控制，不容易被焦虑或负面情绪干扰。这种稳定性使您在高压决策和长期项目中保持良好状态。"
  }
};

// ---- State ----
let currentIdx = 0;
const answers = new Array(questions.length).fill(null);

// ---- Start ----
function startTest() {
  currentIdx = 0;
  answers.fill(null);
  document.getElementById('screen-welcome').classList.add('hidden');
  document.getElementById('screen-results').classList.add('hidden');
  document.getElementById('screen-test').classList.remove('hidden');
  renderQuestion();
}

// ---- Render question ----
function renderQuestion() {
  const q = questions[currentIdx];
  const dim = DIM_NAMES[q.d];
  document.getElementById('dim-tag').textContent = dim.emoji + ' ' + dim.cn;
  document.getElementById('dim-tag').style.color = dim.color;
  const qt = document.getElementById('question-text');
  qt.textContent = (currentIdx+1) + '. ' + q.t;
  qt.classList.remove('fade-in');
  void qt.offsetWidth;
  qt.classList.add('fade-in');

  // Likert buttons
  const labels = ['非常不同意','不同意','中立','同意','非常同意'];
  const group = document.getElementById('likert-group');
  group.innerHTML = '';
  labels.forEach((lbl, i) => {
    const btn = document.createElement('button');
    btn.className = 'likert-btn';
    btn.textContent = lbl;
    if (answers[currentIdx] === i+1) btn.classList.add('selected');
    btn.onclick = () => { answers[currentIdx] = i+1; renderQuestion(); };
    group.appendChild(btn);
  });

  // progress
  const pct = ((currentIdx+1) / questions.length * 100).toFixed(0);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = (currentIdx+1) + ' / ' + questions.length;

  // nav buttons
  document.getElementById('btn-prev').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
  const nextBtn = document.getElementById('btn-next');
  if (answers[currentIdx] !== null) {
    nextBtn.disabled = false;
    nextBtn.textContent = currentIdx === questions.length-1 ? '查看结果' : '下一题';
  } else {
    nextBtn.disabled = true;
    nextBtn.textContent = '请先选择答案';
  }

  document.getElementById('nav-spacer').style.display = currentIdx === 0 ? 'none' : 'inline';
}

function nextQuestion() {
  if (answers[currentIdx] === null) return;
  if (currentIdx < questions.length - 1) {
    currentIdx++;
    renderQuestion();
    document.getElementById('screen-test').scrollIntoView({ behavior:'smooth' });
  } else {
    showResults();
  }
}

function prevQuestion() {
  if (currentIdx > 0) {
    currentIdx--;
    renderQuestion();
  }
}

// ---- Calculate results ----
function calcScores() {
  const scores = { O:[], C:[], E:[], A:[], N:[] };
  questions.forEach((q, i) => {
    let val = answers[i];
    if (q.r) val = 6 - val; // reverse-scored
    scores[q.d].push(val);
  });
  const result = {};
  for (const [k, v] of Object.entries(scores)) {
    result[k] = (v.reduce((a,b) => a+b, 0) / v.length).toFixed(1);
  }
  return result;
}

function pctToLabel(s) {
  if (s >= 4) return '高';
  if (s >= 2.5) return '中等';
  return '低';
}

// ---- Show results ----
function showResults() {
  document.getElementById('screen-test').classList.add('hidden');
  document.getElementById('screen-results').classList.remove('hidden');

  const scores = calcScores();
  const dims = ['O','C','E','A','N'];

  // Radar chart — ink wash style
  const rCtx = document.getElementById('radarChart').getContext('2d');
  if (window._radar) window._radar.destroy();
  window._radar = new Chart(rCtx, {
    type: 'radar',
    data: {
      labels: dims.map(d => DIM_NAMES[d].emoji + ' ' + DIM_NAMES[d].cn),
      datasets: [{
        label: '您的分数',
        data: dims.map(d => scores[d]),
        backgroundColor: 'rgba(44,36,22,.08)',
        borderColor: 'rgba(44,36,22,.7)',
        borderWidth: 1.5,
        pointBackgroundColor: dims.map(d => DIM_NAMES[d].color),
        pointBorderColor: '#fefcf7',
        pointBorderWidth: 1.5,
        pointRadius: 4,
        tension: 0.1,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      scales: { r: {
        min:1, max:5,
        ticks: { stepSize:1, color:'#8b8172', backdropColor:'transparent', font:{size:10} },
        grid: { color:'rgba(44,36,22,.12)' },
        pointLabels: { color:'#2c2416', font:{size:12, family:"'Noto Serif SC', serif"} },
        angleLines: { color:'rgba(44,36,22,.1)' }
      }},
      plugins: { legend: { display: false } }
    }
  });

  // Detail cards
  const det = document.getElementById('trait-details');
  det.innerHTML = '';
  dims.forEach(d => {
    const info = DIM_NAMES[d];
    const score = scores[d];
    const level = pctToLabel(score);
    const descText = level === '高' ? DESC[d].high : (level === '低' ? DESC[d].low : '您在' + info.cn + '维度上处于中等水平，这意味着您的行为模式在不同情境中具有弹性——既不极端偏向某一端，也非简单的折中。这种均衡性使您能够根据具体情境灵活调用不同的应对策略，体现出良好的人格适应性。');
    const barPct = ((score-1)/4*100).toFixed(0);
    det.innerHTML += `
      <div class="trait-detail" style="border-left-color:${info.color}">
        <h3>${info.emoji} ${info.cn} <span style="font-weight:400;font-size:.85rem;color:var(--muted)">${info.en}</span></h3>
        <div class="score-label">得分: <strong style="color:${info.color}">${score}</strong> / 5.0 — ${level} (${score >= 3 ? info.high : info.low})</div>
        <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${barPct}%;background:${info.color}"></div></div>
        <div class="desc">${descText}</div>
      </div>
    `;
  });

  document.getElementById('screen-results').scrollIntoView({ behavior:'smooth' });
}

// ---- Restart ----
function restartTest() {
  answers.fill(null);
  currentIdx = 0;
  document.getElementById('screen-results').classList.add('hidden');
  document.getElementById('screen-test').classList.add('hidden');
  document.getElementById('screen-welcome').classList.remove('hidden');
  document.getElementById('screen-welcome').scrollIntoView({ behavior:'smooth' });
}

// ---- Share ----
function shareResult() {
  const scores = calcScores();
  const dims = ['O','C','E','A','N'];
  let text = '我的大五人格测评结果：\n\n';
  dims.forEach(d => {
    text += DIM_NAMES[d].emoji + ' ' + DIM_NAMES[d].cn + ': ' + scores[d] + '/5.0\n';
  });
  text += '\n您也来测测吧！';
  navigator.clipboard.writeText(text).then(() => {
    alert('结果已复制到剪贴板！');
  }).catch(() => {
    prompt('请手动复制结果：', text);
  });
}
</script>
