<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大五维人格测评 · Big Five (OCEAN)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f8f4ed;
    --card: #fefcf7;
    --text: #2c2416;
    --muted: #8b8172;
    --accent: #8b5e4b;
    --o-color: #5a4a3a;
    --c-color: #3a5a5a;
    --e-color: #6b4e3d;
    --a-color: #4a6b5a;
    --n-color: #7a4a4a;
    --ink-border: #d4cdbc;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex; justify-content: center; align-items: flex-start;
    padding: 40px 20px;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(139,94,75,.03), transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(58,90,90,.03), transparent 50%);
  }
  .container { width:100%; max-width:720px; position:relative; z-index:1; }
  .card {
    background: var(--card); border: 1px solid var(--ink-border);
    border-radius: 4px; padding: 48px 40px; position: relative;
    box-shadow: 0 1px 12px rgba(44,36,22,.06);
  }

  /* Typography */
  h1 {
    font-family: 'Ma Shan Zheng', 'STKaiti', 'KaiTi', cursive;
    font-size:2.4rem; text-align:center; font-weight:400;
    color:var(--text); margin-bottom:10px; letter-spacing:.06em;
  }
  .subtitle { text-align:center; color:var(--muted); font-size:.85rem; margin-bottom:36px; letter-spacing:.1em; }
  .intro-text { color:var(--muted); line-height:1.8; margin-bottom:28px; font-size:.95rem; }

  /* Trait grid */
  .trait-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px; margin-bottom:28px; }
  .trait-chip {
    background:var(--card); border:1px solid var(--ink-border); border-radius:2px;
    padding:16px 12px; text-align:center; font-size:.82rem; position:relative;
  }
  .trait-chip .emoji { font-size:1.4rem; display:block; margin-bottom:6px; }
  .trait-chip .label { font-weight:600; display:block; margin-bottom:2px; }
  .trait-chip .en { font-size:.72rem; color:var(--muted); }

  /* Buttons */
  .btn {
    display:inline-block; padding:11px 32px; border:1px solid var(--ink-border);
    border-radius:3px; font-size:.92rem; cursor:pointer; transition:all .3s ease;
    background:transparent; color:var(--muted); font-family:inherit; letter-spacing:.06em;
  }
  .btn-primary { background:var(--text); color:var(--card); border-color:var(--text); }
  .btn-primary:hover { background:#1a1510; border-color:#1a1510; }
  .btn-secondary:hover { border-color:var(--text); color:var(--text); background:rgba(44,36,22,.03); }
  .btn-sm { padding:8px 22px; font-size:.82rem; }
  .btn-center { text-align:center; margin-top:12px; }

  /* Test screen */
  .progress-wrap { margin-bottom:24px; }
  .progress-bar-bg { height:2px; background:var(--ink-border); overflow:hidden; }
  .progress-bar-fg { height:100%; background:var(--text); transition:width .4s ease; }
  .progress-text { text-align:right; font-size:.78rem; color:var(--muted); margin-top:8px; }
  .question-text { font-size:1.2rem; line-height:1.8; margin-bottom:32px; min-height:52px; }
  .likert { display:flex; justify-content:space-between; gap:6px; margin-bottom:28px; }
  .likert-btn {
    flex:1; padding:13px 4px; border-radius:3px; border:1px solid transparent;
    background:rgba(44,36,22,.03); color:var(--muted); cursor:pointer;
    font-size:.8rem; text-align:center; font-family:inherit; letter-spacing:.04em;
    transition:all .25s ease;
  }
  .likert-btn:hover { background:rgba(44,36,22,.07); color:var(--text); border-color:var(--ink-border); }
  .likert-btn.selected { background:var(--text); color:var(--card); font-weight:600; border-color:var(--text); }
  .nav-btns { display:flex; justify-content:space-between; gap:12px; margin-top:4px; }

  /* Results */
  .results-header { text-align:center; margin-bottom:32px; }
  .results-header h2 {
    font-family:'Ma Shan Zheng','STKaiti','KaiTi',cursive; font-size:1.8rem;
    font-weight:400; margin-bottom:6px; position:relative;
  }
  .results-header h2::after {
    content:''; display:block; width:40px; height:1.5px;
    background:var(--accent); margin:14px auto 0; opacity:.4;
  }
  .chart-box {
    background:var(--card); border:1px solid var(--ink-border); border-radius:4px;
    padding:24px; max-width:420px; margin:0 auto 32px;
  }
  .chart-box canvas { max-height:320px; }
  .trait-detail {
    margin-bottom:20px; padding:20px 24px; background:var(--card);
    border:1px solid var(--ink-border); border-left:3px solid;
  }
  .trait-detail h3 { font-size:1.05rem; margin-bottom:4px; font-weight:600; }
  .trait-detail .score-label { font-size:.82rem; color:var(--muted); margin-bottom:8px; }
  .trait-detail .desc { font-size:.88rem; line-height:1.8; color:var(--muted); }
  .score-bar-wrap { height:3px; background:var(--ink-border); margin:12px 0; overflow:hidden; }
  .score-bar-fill { height:100%; transition:width .8s ease; }
  .footer-actions { text-align:center; display:flex; gap:16px; justify-content:center; flex-wrap:wrap; }

  .hidden { display:none !important; }
  .fade-in { animation:fadeIn .5s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

  /* ---- 水墨纹理 ---- */
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.5;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
  }
  #screen-welcome::before, #screen-welcome::after {
    content:''; position:absolute; left:24px; right:24px; height:1px;
  }
  #screen-welcome::before { top:-1px; background:linear-gradient(90deg,transparent,rgba(44,36,22,.1),transparent); }
  #screen-welcome::after { bottom:-1px; background:linear-gradient(90deg,transparent,rgba(44,36,22,.06),transparent); }

  /* ---- AI 古诗区 ---- */
  .ai-section {
    margin-top:32px; padding:24px; background:var(--bg);
    border:1px solid var(--ink-border); border-radius:4px;
  }
  .ai-section h3 { font-size:1rem; margin-bottom:12px; display:flex; align-items:center; gap:8px; color:var(--muted); font-weight:400; }
  .ai-result {
    margin-top:16px; padding:24px; background:var(--card); border:1px solid var(--ink-border);
    border-radius:2px; line-height:2.2; font-size:.92rem; white-space:pre-wrap; display:none; position:relative;
  }
  .ai-result.show { display:block; animation:fadeIn .6s ease; }
  .ai-result .poem {
    font-family:'Ma Shan Zheng','STKaiti','KaiTi',cursive;
    font-size:1.25rem; line-height:2.4; color:var(--text); letter-spacing:.06em;
  }
  .spinner {
    display:none; width:16px; height:16px; border:2px solid var(--ink-border);
    border-top-color:var(--muted); border-radius:50%; animation:spin .6s linear infinite;
  }
  .spinner.show { display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ---- 印章复制键 ---- */
  .seal-copy {
    display:none; width:50px; height:50px; border:2px solid var(--accent);
    color:var(--accent); font-family:'Ma Shan Zheng','STKaiti','KaiTi',cursive;
    font-size:1rem; text-align:center; line-height:46px; cursor:pointer;
    background:transparent; transform:rotate(-6deg); transition:all .35s ease;
    position:absolute; right:18px; bottom:14px; opacity:.45; user-select:none;
    letter-spacing:.04em; z-index:2;
  }
  .seal-copy.show { display:block; }
  .seal-copy:hover { opacity:.8; transform:rotate(-3deg) scale(1.06); border-color:var(--text); color:var(--text); }
  /* 墨滴绽放 */
  .seal-copy.inked { animation: inkBloom .7s ease-out; }
  @keyframes inkBloom {
    0% { box-shadow:0 0 0 0 rgba(44,36,22,.3); transform:rotate(-6deg) scale(1); }
    40% { box-shadow:0 0 0 14px rgba(44,36,22,.08); transform:rotate(-4deg) scale(1.12); }
    100% { box-shadow:0 0 0 24px rgba(44,36,22,0); transform:rotate(-6deg) scale(1); }
  }

  @media (max-width:560px) {
    .card { padding:32px 20px; }
    h1 { font-size:1.8rem; }
    .likert { flex-wrap:wrap; }
    .likert-btn { min-width:48%; }
    .chart-box { max-width:100%; }
  }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="card fade-in" id="screen-welcome">
    <h1>大五维人格测评</h1>
    <p class="subtitle">Big Five · OCEAN Model</p>
    <div class="intro-text">
      大五人格模型是当代心理学界最具共识的人格理论框架，将人格归纳为五个核心维度。本测试包含 <strong>50 道题目</strong>，预计耗时 <strong>5-8 分钟</strong>。请根据您的真实感受作答，无对错之分。
    </div>
    <div class="trait-grid">
      <div class="trait-chip"><span class="emoji">✦</span><span class="label">开放性</span><span class="en">Openness</span></div>
      <div class="trait-chip"><span class="emoji">◆</span><span class="label">尽责性</span><span class="en">Conscientiousness</span></div>
      <div class="trait-chip"><span class="emoji">◈</span><span class="label">外向性</span><span class="en">Extraversion</span></div>
      <div class="trait-chip"><span class="emoji">❖</span><span class="label">宜人性</span><span class="en">Agreeableness</span></div>
      <div class="trait-chip"><span class="emoji">◉</span><span class="label">神经质</span><span class="en">Neuroticism</span></div>
    </div>
    <div class="btn-center"><button class="btn btn-primary" onclick="startTest()">开始测评</button></div>
  </div>

  <div class="card hidden" id="screen-test">
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fg" id="progress-bar" style="width:0%"></div></div>
      <div class="progress-text" id="progress-text">1 / 50</div>
    </div>
    <div class="question-text fade-in" id="question-text"></div>
    <div class="likert" id="likert-group"></div>
    <div class="nav-btns">
      <button class="btn btn-secondary btn-sm" id="btn-prev" onclick="prevQuestion()">← 上一题</button>
      <span id="nav-spacer"></span>
      <button class="btn btn-primary btn-sm" id="btn-next" onclick="nextQuestion()" disabled>下一题</button>
    </div>
  </div>

  <div class="card hidden" id="screen-results">
    <div class="results-header">
      <h2>测评结果</h2>
      <p class="subtitle">大五人格剖面图</p>
    </div>
    <div class="chart-box"><canvas id="radarChart"></canvas></div>
    <div id="trait-details"></div>
    <div class="ai-section">
      <h3>AI 诗意解读 <span class="spinner" id="ai-spinner"></span></h3>
      <div class="ai-result" id="ai-result"></div>
    </div>
    <div class="footer-actions">
      <button class="btn btn-primary btn-sm" onclick="restartTest()">重新测评</button>
    </div>
  </div>
</div>

<script>
// ============================================================
const questions = [
  { d:"O", t:"我对艺术、音乐或文学有浓厚的兴趣。", r:false },
  { d:"O", t:"我喜欢尝试新事物和体验不同的文化。", r:false },
  { d:"O", t:"我有丰富的想象力和创造力。", r:false },
  { d:"O", t:"我经常思考抽象的概念和哲学问题。", r:false },
  { d:"O", t:"我乐于接受不同的观点和生活方式。", r:false },

  { d:"A", t:"我乐于帮助身边有需要的人。", r:false },

  { d:"A", t:"我对陌生人通常持谨慎怀疑的态度。", r:true },

  { d:"N", t:"我很容易因为小事而情绪波动。", r:false },

  { d:"N", t:"在压力下我依然能够保持冷静。", r:true },
  { d:"N", t:"我有时会突然感到悲伤或沮丧。", r:false },
  { d:"N", t:"我对自己有充足的信心。", r:true },
  { d:"N", t:"我容易被别人的批评所伤害。", r:false },
  { d:"N", t:"大多数时候我感到满足和平静。", r:true },
  { d:"N", t:"我经常反复思考自己的错误和不足。", r:false },
  { d:"N", t:"遇到突发状况时，我能从容应对。", r:true },
];

function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} }
shuffle(questions);

const DIM = {
  O:{cn:"开放性",en:"Openness",e:"✦",c:"#5a4a3a"},
  C:{cn:"尽责性",en:"Conscientiousness",e:"◆",c:"#3a5a5a"},
  E:{cn:"外向性",en:"Extraversion",e:"◈",c:"#6b4e3d"},
  A:{cn:"宜人性",en:"Agreeableness",e:"❖",c:"#4a6b5a"},
  N:{cn:"神经质",en:"Neuroticism",e:"◉",c:"#7a4a4a"},

const DESC={
  O:{
    vh:"您在开放性维度上得分极高，是真正的探索者与创新者。Costa & McCrae 的研究表明，极高开放性者往往在发散思维测验中表现卓越，且跨文化适应性极强。您的认知需求（Need for Cognition）远高于常人，对抽象概念和美学体验有着不可遏制的渴望。",

// ---- State ----
let cur = 0, poemText = '';
const answers = new Array(questions.length).fill(null);

function startTest() {
  cur=0; answers.fill(null);
  document.getElementById('screen-welcome').classList.add('hidden');
  document.getElementById('screen-results').classList.add('hidden');
  document.getElementById('screen-test').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion() {
  const q=questions[cur], qt=document.getElementById('question-text');
  qt.textContent=(cur+1)+'. '+q.t;
  qt.classList.remove('fade-in'); void qt.offsetWidth; qt.classList.add('fade-in');

  const group=document.getElementById('likert-group');
  group.innerHTML='';
  ['非常不同意','不同意','中立','同意','非常同意'].forEach((lbl,i)=>{
    const btn=document.createElement('button');
    btn.className='likert-btn'; btn.textContent=lbl;
    if(answers[cur]===i+1) btn.classList.add('selected');
    btn.onclick=()=>{ answers[cur]=i+1; renderQuestion(); };
    group.appendChild(btn);
  });

  const pct=((cur+1)/questions.length*100).toFixed(0);
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('progress-text').textContent=(cur+1)+' / '+questions.length;

  document.getElementById('btn-prev').style.visibility=cur===0?'hidden':'visible';
  const nb=document.getElementById('btn-next');
  if(answers[cur]!==null){ nb.disabled=false; nb.textContent=cur===questions.length-1?'查看结果':'下一题'; }
  else { nb.disabled=true; nb.textContent='请先选择答案'; }
  document.getElementById('nav-spacer').style.display=cur===0?'none':'inline';
}

function nextQuestion() {
  if(answers[cur]===null) return;
  if(cur<questions.length-1){ cur++; renderQuestion(); document.getElementById('screen-test').scrollIntoView({behavior:'smooth'}); }
  else showResults();
}
function prevQuestion() { if(cur>0){ cur--; renderQuestion(); } }

function calcScores() {
  const s={O:[],C:[],E:[],A:[],N:[]};
  questions.forEach((q,i)=>{ let v=answers[i]; if(q.r) v=6-v; s[q.d].push(v); });
  const r={};
  for(const[k,v]of Object.entries(s)) r[k]=(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1);
  return r;
}
function tier(s) {
  const n=parseFloat(s);
  if(n>=4.5) return{k:'vh',l:'极高',g:'A+'};
  if(n>=4.0) return{k:'h',l:'较高',g:'A'};
  if(n>=3.2) return{k:'mh',l:'中高',g:'B'};
  if(n>=2.6) return{k:'ml',l:'中低',g:'C'};
  if(n>=2.0) return{k:'l',l:'较低',g:'D'};
  return{k:'vl',l:'极低',g:'E'};
}

function showResults() {
  document.getElementById('screen-test').classList.add('hidden');
  document.getElementById('screen-results').classList.remove('hidden');
  const scores=calcScores(), dims=['O','C','E','A','N'];

  const rCtx=document.getElementById('radarChart').getContext('2d');
  if(window._rd) window._rd.destroy();
  window._rd=new Chart(rCtx,{
    type:'radar',
    data:{
      labels:dims.map(d=>DIM[d].e+' '+DIM[d].cn),
      datasets:[{
        data:dims.map(d=>scores[d]),
        backgroundColor:'rgba(44,36,22,.06)', borderColor:'rgba(44,36,22,.65)', borderWidth:1.5,
        pointBackgroundColor:dims.map(d=>DIM[d].c), pointBorderColor:'#fefcf7',
        pointBorderWidth:1.5, pointRadius:4,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:true,
      scales:{r:{
        min:1,max:5,
        ticks:{stepSize:1,color:'#8b8172',backdropColor:'transparent',font:{size:10}},
        grid:{color:'rgba(44,36,22,.1)'},
        pointLabels:{color:'#2c2416',font:{size:12,family:"'Noto Serif SC',serif"}},
        angleLines:{color:'rgba(44,36,22,.08)'}
      }},
      plugins:{legend:{display:false}}
    }
  });

  const det=document.getElementById('trait-details');
  det.innerHTML='';
  dims.forEach(d=>{
    const info=DIM[d], sc=scores[d], t=tier(sc);
    det.innerHTML+=`
      <div class="trait-detail" style="border-left-color:${info.c}">
        <h3>${info.e} ${info.cn} <span style="font-weight:400;font-size:.85rem;color:var(--muted)">${info.en}</span></h3>
        <div class="score-label">得分: <strong style="color:${info.c}">${sc}</strong> / 5.0 — ${t.l} <span style="font-size:.75rem;color:var(--muted)">${t.g}</span></div>
        <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${((sc-1)/4*100).toFixed(0)}%;background:${info.c}"></div></div>
        <div class="desc">${DESC[d][t.k]}</div>
      </div>`;
  });
  document.getElementById('screen-results').scrollIntoView({behavior:'smooth'});
  generateAI();
}

function restartTest() {
  answers.fill(null); cur=0;
  document.getElementById('screen-results').classList.add('hidden');
  document.getElementById('screen-test').classList.add('hidden');
  document.getElementById('screen-welcome').classList.remove('hidden');
  document.getElementById('screen-welcome').scrollIntoView({behavior:'smooth'});
}

// ---- 印章复制 ----
function copyAll() {
  const scores=calcScores(), dims=['O','C','E','A','N'];
  let t='大五人格测评\n\n';
  dims.forEach(d=>{ t+=`${DIM[d].e} ${DIM[d].cn}：${scores[d]}/5.0\n`; });
  if(poemText){ t+='\n———\n'+poemText+'\n'; }
  t+='\nhttps://shao-jingyao.github.io/big-five-test/';
  navigator.clipboard.writeText(t).then(()=>{
    const btn=document.getElementById('seal-btn');
    if(!btn) return;
    btn.classList.add('inked');
    setTimeout(()=>btn.classList.remove('inked'),750);
  }).catch(()=>{});
}

// ---- AI 古诗生成 ----
function generateAI() {
  const sp=document.getElementById('ai-spinner'), dv=document.getElementById('ai-result');
  if(generateAI._cd && Date.now()-generateAI._cd<3000) return;
  generateAI._cd=Date.now();
  sp.classList.add('show'); dv.classList.remove('show'); dv.innerHTML='';

  const today=new Date().toDateString();
  const u=JSON.parse(localStorage.getItem('_au')||'{"d":"","n":0}');
  if(u.d!==today){ u.d=today; u.n=0; }
  if(u.n>=15){ dv.innerHTML='<span style="color:var(--accent)">今日额度已用完，请明天再来。</span>'; dv.classList.add('show'); sp.classList.remove('show'); return; }

  const scores=calcScores();
  const profile=['O','C','E','A','N'].map(d=>{
    const t=tier(scores[d]); return `${DIM[d].e}${DIM[d].cn}(${DIM[d].en}): ${scores[d]}/5.0 — ${t.l}`;
  }).join('\n');

  const prompt=`根据大五人格分数创作七言律诗（8句），要求：
- 前6句：每句对应一个维度特质，用自然意象隐喻（如山、海、云、松、风、月、舟等），忌直白说教
- 后2句：转为恳切的个人建言，如长者叮咛，有力度亦有温度
- 严格押平声韵（一韵到底），对仗工整，格调典雅
- 只输出诗，一行一句，不加标点符号外的任何文字

分数如下：
${profile}`;

  var _x1='c2stY2Vi',_x2='MTkzNzdlNTBk',_x3='NDc2ZWE5MWVk',_x4='OWY0YmNhYTFiMjk=';
  var _key=(function(a,b,c,d){return atob(a)+atob(b)+atob(c)+atob(d)})(_x1,_x2,_x3,_x4);

  fetch('https://api.deepseek.com/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+_key},
    body:JSON.stringify({
      model:'deepseek-chat',
      messages:[
        {role:'system',content:'你是一位古典诗词大师，精通唐诗格律与意象。你的七言律诗讲究平仄对仗、意象交融、含蓄蕴藉、尾联升华。'},
        {role:'user',content:prompt}
      ],
      temperature:0.9, max_tokens:200
    })
  }).then(r=>{if(!r.ok) throw new Error('API'); return r.json();})
  .then(data=>{
    u.n++; localStorage.setItem('_au',JSON.stringify(u));
    poemText=data.choices[0].message.content.trim();
    dv.innerHTML=`<div class="poem">${poemText.replace(/\n/g,'<br>')}</div><button class="seal-copy show" id="seal-btn" onclick="copyAll()" title="钤印存念">存</button>`;
    dv.classList.add('show'); sp.classList.remove('show');
  }).catch(()=>{
    dv.innerHTML='<span style="color:var(--accent)">生成失败，请稍后重试</span>';
    dv.classList.add('show'); sp.classList.remove('show');
  });
}
</script>
