<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大五维人格测评 · Big Five (OCEAN)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --text: #e0e0e0;
    --muted: #8888aa;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --danger: #ff6b6b;
    --o-color: #ff6b9d;
    --c-color: #4ecdc4;
    --e-color: #ffe66d;
    --a-color: #a29bfe;
    --n-color: #fd79a8;
    --radius: 16px;
    --shadow: 0 4px 24px rgba(0,0,0,.4);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    background-image: radial-gradient(ellipse at top, rgba(108,99,255,.12), transparent 50%),
                      radial-gradient(ellipse at bottom right, rgba(0,212,170,.08), transparent 50%);
  }
  .container {
    width: 100%;
    max-width: 720px;
  }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 40px 36px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(255,255,255,.06);
  }
  h1 {
    font-size: 2rem;
    text-align: center;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: .9rem;
    margin-bottom: 32px;
  }
  .intro-text {
    color: var(--muted);
    line-height: 1.8;
    margin-bottom: 28px;
    font-size: .95rem;
  }
  .trait-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .trait-chip {
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px;
    padding: 14px 12px;
    text-align: center;
    font-size: .82rem;
  }
  .trait-chip .emoji { font-size: 1.4rem; display:block; margin-bottom: 6px; }
  .trait-chip .label { font-weight: 600; display:block; margin-bottom:2px; }
  .trait-chip .en   { font-size: .72rem; color: var(--muted); }
  .btn {
    display: inline-block;
    padding: 14px 40px;
    border: none;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .25s;
    text-decoration: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #7c6ff7);
    color: #fff;
    box-shadow: 0 4px 16px rgba(108,99,255,.35);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(108,99,255,.5);
  }
  .btn-secondary {
    background: rgba(255,255,255,.06);
    color: var(--text);
    border: 1px solid rgba(255,255,255,.12);
  }
  .btn-sm {
    padding: 10px 24px;
    font-size: .85rem;
  }
  .btn-center { text-align: center; margin-top: 12px; }
  .progress-wrap {
    margin-bottom: 24px;
  }
  .progress-bar-bg {
    height: 6px;
    background: rgba(255,255,255,.06);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fg {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width .4s ease;
  }
  .progress-text {
    text-align: right;
    font-size: .78rem;
    color: var(--muted);
    margin-top: 6px;
  }
  .dimension-label {
    font-size: .82rem;
    color: var(--muted);
    margin-bottom: 8px;
    padding: 6px 14px;
    border-radius: 20px;
    display: inline-block;
    background: rgba(255,255,255,.04);
  }
  .question-text {
    font-size: 1.15rem;
    line-height: 1.6;
    margin-bottom: 28px;
    min-height: 52px;
  }
  .likert {
    display: flex;
    justify-content: space-between;
    gap: 6px;
    margin-bottom: 28px;
  }
  .likert-btn {
    flex: 1;
    padding: 12px 4px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,.1);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: .82rem;
    transition: all .2s;
    text-align: center;
  }
  .likert-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }
  .likert-btn.selected {
    background: rgba(108,99,255,.15);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .nav-btns {
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  /* Results */
  .results-header {
    text-align: center;
    margin-bottom: 32px;
  }
  .results-header h2 {
    font-size: 1.5rem;
    margin-bottom: 6px;
  }
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 32px;
  }
  @media (max-width: 560px) {
    .charts-row { grid-template-columns: 1fr; }
  }
  .chart-box {
    background: rgba(255,255,255,.03);
    border-radius: var(--radius);
    padding: 20px;
    border: 1px solid rgba(255,255,255,.06);
    position: relative;
    min-height: 260px;
  }
  .chart-box canvas { max-height: 260px; }
  .trait-detail {
    margin-bottom: 24px;
    padding: 18px;
    border-radius: var(--radius);
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.06);
    border-left: 4px solid;
  }
  .trait-detail h3 {
    font-size: 1.05rem;
    margin-bottom: 4px;
  }
  .trait-detail .score-label {
    font-size: .82rem;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .trait-detail .desc {
    font-size: .88rem;
    line-height: 1.7;
    color: var(--muted);
  }
  .score-bar-wrap {
    height: 6px;
    background: rgba(255,255,255,.08);
    border-radius: 3px;
    margin: 10px 0;
    overflow: hidden;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .8s ease;
  }
  .footer-actions {
    text-align: center;
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .hidden { display: none !important; }
  .fade-in { animation: fadeIn .4s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  /* AI section */
  .ai-section {
    margin-top: 32px;
    padding: 24px;
    background: rgba(108,99,255,.06);
    border-radius: var(--radius);
    border: 1px solid rgba(108,99,255,.15);
  }
  .ai-section h3 { font-size:1.1rem; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .api-key-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    align-items: center;
    flex-wrap: wrap;
  }
  .api-key-row input {
    flex: 1;
    min-width: 180px;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.04);
    color: var(--text);
    font-size: .82rem;
    font-family: monospace;
  }
  .api-key-row input::placeholder { color: var(--muted); font-family: inherit; font-size:.78rem; }
  .ai-result {
    margin-top: 16px;
    padding: 20px;
    background: rgba(0,0,0,.2);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.06);
    line-height: 2;
    font-size: .92rem;
    white-space: pre-wrap;
    display: none;
  }
  .ai-result.show { display: block; animation: fadeIn .6s ease; }
  .ai-result .poem {
    font-style: italic;
    color: #ffe66d;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,.1);
  }
  .ai-result .advice { color: #4ecdc4; }
  .spinner {
    display: none;
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  .spinner.show { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container" id="app">
  <!-- ========== WELCOME SCREEN ========== -->
  <div class="card fade-in" id="screen-welcome">
    <h1>🧠 大五维人格测评</h1>
    <p class="subtitle">Big Five Personality Test · OCEAN Model</p>
    <div class="intro-text">
      大五人格模型是目前心理学界最广泛认可的人格理论框架，将人格归纳为五个核心维度。本测试包含 <strong>50 道题目</strong>，预计耗时 <strong>5-8 分钟</strong>。请根据您的真实感受作答，没有对错之分。
    </div>
    <div class="trait-grid">
      <div class="trait-chip"><span class="emoji">🎨</span><span class="label">开放性</span><span class="en">Openness</span></div>
      <div class="trait-chip"><span class="emoji">🎯</span><span class="label">尽责性</span><span class="en">Conscientiousness</span></div>
      <div class="trait-chip"><span class="emoji">🎤</span><span class="label">外向性</span><span class="en">Extraversion</span></div>
      <div class="trait-chip"><span class="emoji">🤝</span><span class="label">宜人性</span><span class="en">Agreeableness</span></div>
      <div class="trait-chip"><span class="emoji">🌊</span><span class="label">神经质</span><span class="en">Neuroticism</span></div>
    </div>
    <div class="btn-center">
      <button class="btn btn-primary" onclick="startTest()">开始测评 →</button>
    </div>
  </div>

  <!-- ========== TEST SCREEN ========== -->
  <div class="card hidden" id="screen-test">
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fg" id="progress-bar" style="width:0%"></div></div>
      <div class="progress-text" id="progress-text">1 / 50</div>
    </div>
    <div class="question-text fade-in" id="question-text"></div>
    <div class="likert" id="likert-group"></div>
    <div class="nav-btns">
      <button class="btn btn-secondary btn-sm" id="btn-prev" onclick="prevQuestion()">← 上一题</button>
      <span id="nav-spacer"></span>
      <button class="btn btn-primary btn-sm" id="btn-next" onclick="nextQuestion()" disabled>下一题 →</button>
    </div>
  </div>

  <!-- ========== RESULTS SCREEN ========== -->
  <div class="card hidden" id="screen-results">
    <div class="results-header">
      <h2>📊 您的测评结果</h2>
      <p class="subtitle">大五人格剖面图</p>
    </div>
    <div class="charts-row">
      <div class="chart-box"><canvas id="radarChart"></canvas></div>
      <div class="chart-box"><canvas id="barChart"></canvas></div>
    </div>
    <div id="trait-details"></div>
    <!-- AI 深度分析 -->
    <div class="ai-section" id="ai-section">
      <h3>🤖 AI 深度解读 <span class="spinner" id="ai-spinner"></span></h3>
      <div class="btn-center">
        <button class="btn btn-primary" onclick="generateAI()">✨ 生成诗意评价</button>
      </div>
      <div class="ai-result" id="ai-result"></div>
    </div>
    <div class="footer-actions">
      <button class="btn btn-primary btn-sm" onclick="restartTest()">🔄 重新测评</button>
      <button class="btn btn-secondary btn-sm" onclick="shareResult()">📋 复制结果</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  QUESTION BANK — 50 items, 10 per dimension
//  Some items are reverse-scored (marked with r: true)
// ============================================================
const questions = [
  // ---- O: 开放性 (Openness) ----
  { d:"O", t:"我对艺术、音乐或文学有浓厚的兴趣。", r:false },
  { d:"O", t:"我喜欢尝试新事物和体验不同的文化。", r:false },
  { d:"O", t:"我有丰富的想象力和创造力。", r:false },
  { d:"O", t:"我经常思考抽象的概念和哲学问题。", r:false },
  { d:"O", t:"我乐于接受不同的观点和生活方式。", r:false },
  { d:"O", t:"我对自然科学或新技术充满好奇。", r:false },
  { d:"O", t:"我更喜欢按部就班，不喜欢变化。", r:true },
  { d:"O", t:"我有广泛的兴趣爱好。", r:false },
  { d:"O", t:"我经常沉浸在思考和内省中。", r:false },
  { d:"O", t:"跟抽象理论相比，我更关注眼前的具体事实。", r:true },

  // ---- C: 尽责性 (Conscientiousness) ----
  { d:"C", t:"我做事有条理，喜欢提前规划。", r:false },
  { d:"C", t:"我能够自律地完成任务，不拖延。", r:false },
  { d:"C", t:"我注重细节，追求高质量的工作。", r:false },
  { d:"C", t:"我遵守承诺，值得他人信赖。", r:false },
  { d:"C", t:"我的房间或工作空间通常整洁有序。", r:false },
  { d:"C", t:"我经常把事情拖到最后一刻才做。", r:true },
  { d:"C", t:"我设定了明确的目标并努力去实现它们。", r:false },
  { d:"C", t:"我做事冲动，想到什么就做什么。", r:true },
  { d:"C", t:"我会认真检查自己的作业或工作成果。", r:false },
  { d:"C", t:"我在团队中通常是推动事情进展的那个人。", r:false },

  // ---- E: 外向性 (Extraversion) ----
  { d:"E", t:"我喜欢参加聚会和社交活动。", r:false },
  { d:"E", t:"我在人群中感到精力充沛。", r:false },
  { d:"E", t:"我很容易结交新朋友。", r:false },
  { d:"E", t:"我说话声音较大，喜欢表达自己。", r:false },
  { d:"E", t:"我宁愿一个人待着，也不愿参加热闹的活动。", r:true },
  { d:"E", t:"我在社交场合中通常是活跃气氛的人。", r:false },
  { d:"E", t:"我不喜欢成为众人关注的焦点。", r:true },
  { d:"E", t:"我喜欢快节奏、充满刺激的生活。", r:false },
  { d:"E", t:"跟很多人在一起时，我倾向于保持安静。", r:true },
  { d:"E", t:"我喜欢与人交谈，分享自己的想法。", r:false },

  // ---- A: 宜人性 (Agreeableness) ----
  { d:"A", t:"我乐于帮助身边有需要的人。", r:false },
  { d:"A", t:"我相信大多数人都是善良诚实的。", r:false },
  { d:"A", t:"我尽量避免与他人发生冲突。", r:false },
  { d:"A", t:"我对他人的感受很敏感，容易共情。", r:false },
  { d:"A", t:"我愿意为了团队利益牺牲个人利益。", r:false },
  { d:"A", t:"我会直言不讳地表达批评意见。", r:true },
  { d:"A", t:"我能够原谅曾经伤害过我的人。", r:false },
  { d:"A", t:"我认为在竞争中压倒对手很重要。", r:true },
  { d:"A", t:"我经常主动赞美和鼓励他人。", r:false },
  { d:"A", t:"我对陌生人通常持谨慎怀疑的态度。", r:true },

  // ---- N: 神经质 (Neuroticism) ----
  { d:"N", t:"我经常感到焦虑或紧张。", r:false },
  { d:"N", t:"我很容易因为小事而情绪波动。", r:false },
  { d:"N", t:"我经常担心未来可能发生的事情。", r:false },
  { d:"N", t:"在压力下我依然能够保持冷静。", r:true },
  { d:"N", t:"我有时会突然感到悲伤或沮丧。", r:false },
  { d:"N", t:"我对自己有充足的信心。", r:true },
  { d:"N", t:"我容易被别人的批评所伤害。", r:false },
  { d:"N", t:"大多数时候我感到满足和平静。", r:true },
  { d:"N", t:"我经常反复思考自己的错误和不足。", r:false },
  { d:"N", t:"遇到突发状况时，我能从容应对。", r:true },
];

// Fisher-Yates shuffle — randomize question order
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}
shuffle(questions);

const DIM_NAMES = {
  O: { cn:"开放性", en:"Openness", emoji:"🎨", color:"#ff6b9d", low:"保守传统", high:"开放创新" },
  C: { cn:"尽责性", en:"Conscientiousness", emoji:"🎯", color:"#4ecdc4", low:"随性灵活", high:"自律严谨" },
  E: { cn:"外向性", en:"Extraversion", emoji:"🎤", color:"#ffe66d", low:"内向沉静", high:"外向活跃" },
  A: { cn:"宜人性", en:"Agreeableness", emoji:"🤝", color:"#a29bfe", low:"理性独立", high:"温暖合作" },
  N: { cn:"神经质", en:"Neuroticism", emoji:"🌊", color:"#fd79a8", low:"情绪稳定", high:"敏感波动" },
};

const DESC = {
  O: {
    vh: "您具有极高的开放性，是真正的探索者和创新者。您对艺术、文化和抽象概念有强烈的热情，喜欢打破常规、尝试全新体验。您的思维灵活而广阔，常常产生独特的洞见和创意。",
    h: "您具有较高的开放性，对新事物持欢迎态度，乐于探索不同文化和观念。您有一定的创造力和好奇心，在熟悉与未知之间保持良好平衡。",
    mh: "您的开放性中等偏高，既有务实的一面，也对新鲜体验抱有兴趣。您能够在必要的时候跳出舒适圈，但不轻易放弃熟悉的框架。",
    ml: "您的开放性中等偏低，更倾向于可预测和稳定的环境。您对已经验证过的方法更有信心，面对变化时会谨慎评估。",
    l: "您的开放性较低，偏好熟悉、可靠和传统的模式。您务实且脚踏实地，重视经验胜过抽象理论，在有明确规则的领域表现优异。",
    vl: "您的开放性非常低，非常偏好稳定和秩序。您对不确定性感到不适，习惯于按既定流程行事。您的优势在于专注和坚持，能够在结构化环境中做到极致。"
  },
  C: {
    vh: "您具有极高的尽责性，是典型的自驱型完美主义者。您善于规划、执行到位，注重每一个细节。您值得深度信赖，在长期目标上展现出惊人的毅力和纪律。",
    h: "您具有较高的尽责性，做事有条理且可靠。您能够有效管理时间和任务，在大多数情况下都能按时高质量完成工作。",
    mh: "您的尽责性中等偏高，在重要事务上能够认真对待，但也懂得适时放松。您有一定的组织能力，能在结构和灵活性之间找到平衡。",
    ml: "您的尽责性中等偏低，更倾向于随性而为。您不喜欢被严格的计划束缚，但在关键时刻能够集中精力完成任务。",
    l: "您的尽责性较低，偏好自由灵活的生活方式。您可能不太在意细节和秩序，但适应能力强，能在变化环境中快速行动。",
    vl: "您的尽责性非常低，完全是随性主义者。您活在当下，不喜欢计划和约束。您的优势在于极强的适应性和即兴发挥能力，但在需要长期承诺的事务上可能需要额外注意。"
  },
  E: {

// ---- State ----
let currentIdx = 0;
const answers = new Array(questions.length).fill(null);

// ---- Start ----
function startTest() {
  currentIdx = 0;
  answers.fill(null);
  document.getElementById('screen-welcome').classList.add('hidden');
  document.getElementById('screen-results').classList.add('hidden');
  document.getElementById('screen-test').classList.remove('hidden');
  renderQuestion();
}

// ---- Render question ----
function renderQuestion() {
  const q = questions[currentIdx];
  const qt = document.getElementById('question-text');
  qt.textContent = (currentIdx+1) + '. ' + q.t;
  qt.classList.remove('fade-in');
  void qt.offsetWidth;
  qt.classList.add('fade-in');

  // Likert buttons
  const labels = ['非常不同意','不同意','中立','同意','非常同意'];
  const group = document.getElementById('likert-group');
  group.innerHTML = '';
  labels.forEach((lbl, i) => {
    const btn = document.createElement('button');
    btn.className = 'likert-btn';
    btn.textContent = lbl;
    if (answers[currentIdx] === i+1) btn.classList.add('selected');
    btn.onclick = () => { answers[currentIdx] = i+1; renderQuestion(); };
    group.appendChild(btn);
  });

  // progress
  const pct = ((currentIdx+1) / questions.length * 100).toFixed(0);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = (currentIdx+1) + ' / ' + questions.length;

  // nav buttons
  document.getElementById('btn-prev').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
  const nextBtn = document.getElementById('btn-next');
  if (answers[currentIdx] !== null) {
    nextBtn.disabled = false;
    nextBtn.textContent = currentIdx === questions.length-1 ? '查看结果 ✨' : '下一题 →';
  } else {
    nextBtn.disabled = true;
    nextBtn.textContent = '请先选择答案';
  }

  document.getElementById('nav-spacer').style.display = currentIdx === 0 ? 'none' : 'inline';
}

function nextQuestion() {
  if (answers[currentIdx] === null) return;
  if (currentIdx < questions.length - 1) {
    currentIdx++;
    renderQuestion();
    document.getElementById('screen-test').scrollIntoView({ behavior:'smooth' });
  } else {
    showResults();
  }
}

function prevQuestion() {
  if (currentIdx > 0) {
    currentIdx--;
    renderQuestion();
  }
}

// ---- Calculate results ----
function calcScores() {
  const scores = { O:[], C:[], E:[], A:[], N:[] };
  questions.forEach((q, i) => {
    let val = answers[i];
    if (q.r) val = 6 - val; // reverse-scored
    scores[q.d].push(val);
  });
  const result = {};
  for (const [k, v] of Object.entries(scores)) {
    result[k] = (v.reduce((a,b) => a+b, 0) / v.length).toFixed(1);
  }
  return result;
}

function scoreToTier(s) {
  const num = parseFloat(s);
  if (num >= 4.5) return { key:'vh', label:'非常高', grade:'A+' };
  if (num >= 4.0) return { key:'h',  label:'较高',   grade:'A' };
  if (num >= 3.2) return { key:'mh', label:'中等偏高', grade:'B' };
  if (num >= 2.6) return { key:'ml', label:'中等偏低', grade:'C' };
  if (num >= 2.0) return { key:'l',  label:'较低',   grade:'D' };
  return { key:'vl', label:'非常低', grade:'E' };
}

// ---- Show results ----
function showResults() {
  document.getElementById('screen-test').classList.add('hidden');
  document.getElementById('screen-results').classList.remove('hidden');

  const scores = calcScores();
  const dims = ['O','C','E','A','N'];

  // Radar chart
  const rCtx = document.getElementById('radarChart').getContext('2d');
  if (window._radar) window._radar.destroy();
  window._radar = new Chart(rCtx, {
    type: 'radar',
    data: {
      labels: dims.map(d => DIM_NAMES[d].emoji + ' ' + DIM_NAMES[d].cn),
      datasets: [{
        label: '您的分数',
        data: dims.map(d => scores[d]),
        backgroundColor: 'rgba(108,99,255,.2)',
        borderColor: 'rgba(108,99,255,.8)',
        borderWidth: 2,
        pointBackgroundColor: dims.map(d => DIM_NAMES[d].color),
        pointBorderColor: '#fff',
        pointRadius: 5,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      scales: { r: { min:1, max:5, ticks:{stepSize:1,color:'#8888aa',backdropColor:'transparent'}, grid:{color:'rgba(255,255,255,.1)'}, pointLabels:{color:'#e0e0e0',font:{size:12}} } },
      plugins: { legend: { display: false } }
    }
  });

  // Bar chart
  const bCtx = document.getElementById('barChart').getContext('2d');
  if (window._bar) window._bar.destroy();
  window._bar = new Chart(bCtx, {
    type: 'bar',
    data: {
      labels: dims.map(d => DIM_NAMES[d].cn),
      datasets: [{
        label: '得分',
        data: dims.map(d => scores[d]),
        backgroundColor: dims.map(d => DIM_NAMES[d].color + '99'),
        borderColor: dims.map(d => DIM_NAMES[d].color),
        borderWidth: 2,
        borderRadius: 8,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      indexAxis: 'y',
      scales: {
        x: { min:1, max:5, ticks:{color:'#8888aa'}, grid:{color:'rgba(255,255,255,.08)'} },
        y: { ticks:{color:'#e0e0e0',font:{size:13}}, grid:{display:false} }
      },
      plugins: { legend: { display:false } }
    }
  });

  // Detail cards
  const det = document.getElementById('trait-details');
  det.innerHTML = '';
  dims.forEach(d => {
    const info = DIM_NAMES[d];
    const score = scores[d];
    const tier = scoreToTier(score);
    const descText = DESC[d][tier.key];
    const barPct = ((score-1)/4*100).toFixed(0);
    det.innerHTML += `
      <div class="trait-detail" style="border-left-color:${info.color}">
        <h3>${info.emoji} ${info.cn} <span style="font-weight:400;font-size:.85rem;color:var(--muted)">${info.en}</span></h3>
        <div class="score-label">得分: <strong style="color:${info.color}">${score}</strong> / 5.0 — ${tier.label} <span style="font-size:.75rem;color:var(--muted)">${tier.grade}</span></div>
        <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${barPct}%;background:${info.color}"></div></div>
        <div class="desc">${descText}</div>
      </div>
    `;
  });

  document.getElementById('screen-results').scrollIntoView({ behavior:'smooth' });

  // Auto-generate poem after a short delay
  setTimeout(generateAI, 800);
}

// ---- Restart ----
function restartTest() {
  answers.fill(null);
  currentIdx = 0;
  document.getElementById('screen-results').classList.add('hidden');
  document.getElementById('screen-test').classList.add('hidden');
  document.getElementById('screen-welcome').classList.remove('hidden');
  document.getElementById('screen-welcome').scrollIntoView({ behavior:'smooth' });
}

// ---- Share ----
function shareResult() {
  const scores = calcScores();
  const dims = ['O','C','E','A','N'];
  let text = '🧠 我的大五人格测评结果：\n\n';
  dims.forEach(d => {
    text += DIM_NAMES[d].emoji + ' ' + DIM_NAMES[d].cn + ': ' + scores[d] + '/5.0\n';
  });
  text += '\n你也来测测吧！';
  navigator.clipboard.writeText(text).then(() => {
    alert('结果已复制到剪贴板！');
  }).catch(() => {
    prompt('请手动复制结果：', text);
  });
}

// ---- AI generation (embedded key, algorithmic fallback) ----
function generateAI() {
  const spinner = document.getElementById('ai-spinner');
  const resultDiv = document.getElementById('ai-result');

  // Cooldown: 3s between calls
  if (generateAI._cooldown && Date.now() - generateAI._cooldown < 3000) {
    return;
  }
  generateAI._cooldown = Date.now();

  spinner.classList.add('show');
  resultDiv.classList.remove('show');
  resultDiv.innerHTML = '';

  // Rate limit: 15/day per browser
  const today = new Date().toDateString();
  const usage = JSON.parse(localStorage.getItem('_au') || '{"d":"","n":0}');
  if (usage.d !== today) { usage.d = today; usage.n = 0; }
  if (usage.n >= 15) {
    resultDiv.innerHTML = '<span style="color:#ff6b6b">⚠️ 今日额度已用完，请明天再来。</span>';
    resultDiv.classList.add('show');
    spinner.classList.remove('show');
    return;
  }

  const scores = calcScores();
  const dims = ['O','C','E','A','N'];
  const profile = dims.map(d => {
    const tier = scoreToTier(scores[d]);
    return `${DIM_NAMES[d].emoji}${DIM_NAMES[d].cn}(${DIM_NAMES[d].en}): ${scores[d]}/5.0 — ${tier.label}`;
  }).join('\n');

  const prompt = `根据大五人格分数创作七言律诗（8句），要求：
- 前6句：每句对应一个维度特质，用自然意象隐喻（如山、海、云、松、风、月、舟等），忌直白说教
- 后2句：转为恳切的个人建言，如长者叮咛，有力度亦有温度
- 严格押平声韵（一韵到底），对仗工整，格调典雅
- 只输出诗，一行一句，不加标点符号外的任何文字

分数如下：
${profile}`;

  // Decode embedded key
  var _x1='c2stY2Vi';var _x2='MTkzNzdlNTBk';var _x3='NDc2ZWE5MWVk';var _x4='OWY0YmNhYTFiMjk=';
  var _key = (function(a,b,c,d){return atob(a)+atob(b)+atob(c)+atob(d)})(_x1,_x2,_x3,_x4);

  fetch('https://api.deepseek.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + _key },
    body: JSON.stringify({
      model: 'deepseek-chat',
      messages: [
        { role: 'system', content: '你是一位古典诗词大师，精通唐诗格律与意象。你的七言律诗讲究平仄对仗、意象交融、含蓄蕴藉、尾联升华。' },
        { role: 'user', content: prompt }
      ],
      temperature: 0.9, max_tokens: 200
    })
  }).then(res => {
    if (!res.ok) throw new Error('API error');
    return res.json();
  }).then(data => {
    usage.n++;
    localStorage.setItem('_au', JSON.stringify(usage));
    const poem = data.choices[0].message.content.trim().replace(/\n/g, '<br>');
    resultDiv.innerHTML = `
      <div style="font-size:.75rem;color:var(--muted);margin-bottom:8px">✨ DeepSeek V3</div>
      <div class="poem">${poem}</div>
    `;
    resultDiv.classList.add('show');
    spinner.classList.remove('show');
  }).catch(e => {
    resultDiv.innerHTML = `<span style="color:#ff6b6b">❌ 生成失败，请稍后重试</span>`;
    resultDiv.classList.add('show');
    spinner.classList.remove('show');
  });
}
